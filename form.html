<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צור קשר - YT music</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background: linear-gradient(135deg,#cfe0fc,#e0efff);
  padding-top:70px;
  direction:rtl;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:65px;
  background:white;
  display:flex;
  align-items:center;
  box-shadow:0 4px 25px rgba(0,0,0,0.18);
  z-index:10;
}

.header-inner{
  max-width:1100px;
  width:95%;
  margin:auto;
  display:flex;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  direction:ltr;
}

.logo img, .logo span{
  cursor:pointer;
}

.logo img{
  width:50px;
  height:50px;
  border-radius:6px;
  box-shadow:0 0 20px rgba(37,99,235,0.8);
}

.logo span{
  font-weight:bold;
  font-size:22px;
  color:#1e40af;
}

/* BACKGROUND */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  overflow:hidden;
}

.equalizer{
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:5px;
  height:140px;
  opacity:0.35;
}

.equalizer span{
  width:8px;
  background:#1e3a8a;
  border-radius:4px;
  animation:bars 1.2s infinite ease-in-out;
}

.equalizer span:nth-child(2){animation-delay:.2s}
.equalizer span:nth-child(3){animation-delay:.4s}
.equalizer span:nth-child(4){animation-delay:.6s}
.equalizer span:nth-child(5){animation-delay:.8s}

@keyframes bars{
  0%{height:15px}
  50%{height:90px}
  100%{height:15px}
}

/* FORM */
.container{
  max-width:640px;
  margin:auto;
  padding:40px;
}

.card{
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(14px);
  padding:50px;
  border-radius:25px;
  box-shadow:0 35px 70px rgba(0,0,0,0.28);
}

h1{
  font-size:32px;
  margin-bottom:10px;
}

.subtitle{
  color:#333;
  margin-bottom:25px;
  font-size:16px;
}

.row{
  display:flex;
  gap:15px;
}

.field{
  flex:1;
  display:flex;
  flex-direction:column;
  margin-top:15px;
}

input,textarea{
  padding:16px;
  border-radius:12px;
  border:1px solid #999;
  font-size:16px;
  outline:none;
  text-align:right;
  background:#f7faff;
}

textarea{
  min-height:150px;
  resize:vertical;
}

button{
  margin-top:25px;
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  background:#1e40af;
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 12px 28px rgba(30,58,138,0.5);
  transition:0.3s;
}

button:hover{
  background:#1e3a8a;
  box-shadow:0 15px 32px rgba(30,58,138,0.6);
}

.success{
  display:none;
  margin-top:20px;
  color:green;
  font-weight:bold;
  text-align:center;
  font-size:16px;
}
</style>
</head>

<body>

<div class="bg">
  <div class="equalizer">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<header dir="ltr">
  <div class="header-inner">
    <div class="logo">
      <a href="index.html">
        <img src="images/yt.png" onerror="this.src='https://placehold.co/50x50/1e40af/ffffff?text=YT'">
      </a>
      <a href="index.html" style="text-decoration:none;">
        <span>YT music</span>
      </a>
    </div>
  </div>
</header>

<div class="container">
  <div class="card">
    <h1>צרו קשר</h1>
    <div class="subtitle">נשמח לשמוע מכם</div>

    <form id="contactForm" action="https://formspree.io/f/xbdpokgr" method="POST">
      <div class="row">
        <div class="field">
          <label>שם פרטי</label>
          <input type="text" name="firstName" required>
        </div>
        <div class="field">
          <label>שם משפחה</label>
          <input type="text" name="lastName" required>
        </div>
      </div>

      <div class="field">
        <label>אימייל</label>
        <input type="email" name="email" required dir="ltr" style="text-align:left">
      </div>

      <div class="field">
        <label>הודעה</label>
        <textarea name="message" required></textarea>
      </div>

      <button type="submit">שלח הודעה</button>
      <div class="success" id="successMsg">ההודעה נשלחה בהצלחה!</div>
    </form>
  </div>
</div>

<script>
const form = document.getElementById("contactForm");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  successMsg.style.display = "none";

  const data = new FormData(form);

  const response = await fetch(form.action, {
    method: "POST",
    body: data,
    headers: {
      'Accept': 'application/json'
    }
  });

  if (response.ok) {
    form.reset();
    successMsg.style.display = "block";
  } else {
    alert("שגיאה בשליחה. נסה שוב.");
  }
});
</script>

</body>
</html>
